<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Video</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: #0b1220;
            color: #e5e7eb;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 1px dashed #334155;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #020617;
        }

        .upload-box:hover {
            border-color: #3b82f6;
        }

        .icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .file-name {
            margin-top: 10px;
            font-size: 13px;
            color: #cbd5f5;
        }

        .upload-btn {
            margin-top: 15px;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            display: none;
        }

        .progress {
            margin-top: 20px;
            height: 4px;
            width: 100%;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #3b82f6;
            transition: width 0.2s ease;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #94a3b8;
        }

        /* Loader */
        .loader {
            display: none;
            margin: 15px auto;
            width: 24px;
            height: 24px;
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Upload video</h1>
    <p>Video will be processed into HLS</p>

    <div class="upload-box" id="uploadBox">
        <div class="icon" id="icon">📁</div>
        <div id="text">Click or drag video here</div>
        <div class="file-name" id="fileName"></div>
    </div>

    <!-- Upload Button -->
    <button class="upload-btn" id="uploadBtn">⬆ Upload</button>

    <!-- Progress -->
    <div class="progress" id="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader"></div>

    <div class="status" id="status"></div>

</div>

<input type="file" id="fileInput" accept="video/*" hidden>

<script>

    const uploadBox = document.getElementById("uploadBox");
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const uploadBtn = document.getElementById("uploadBtn");
    const progress = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const icon = document.getElementById("icon");

    let selectedFile;

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = () => {
        selectedFile = fileInput.files[0];
        if (!selectedFile) return;

        fileName.innerText = selectedFile.name;

        // Show upload button + change icon
        uploadBtn.style.display = "inline-block";
        icon.innerText = "⬆";
        status.innerText = "Ready to upload";
    };

    uploadBtn.onclick = uploadFile;

    uploadBox.ondrop = (e) => {
        e.preventDefault();
        selectedFile = e.dataTransfer.files[0];

        fileName.innerText = selectedFile.name;
        uploadBtn.style.display = "inline-block";
        icon.innerText = "⬆";
        status.innerText = "Ready to upload";
    };

    uploadBox.ondragover = (e) => e.preventDefault();

    function uploadFile() {

        const formData = new FormData();
        formData.append("videoFile", selectedFile);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/videos/upload");

        progress.style.display = "block";
        uploadBtn.style.display = "none";
        icon.innerText = "⏳";

        xhr.upload.onprogress = (e) => {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + "%";
            status.innerText = "Uploading " + percent + "%";
        };

        xhr.onload = () => {

            // Upload done → switch to processing mode
            progress.style.display = "none";
            loader.style.display = "block";
            status.innerText = "Processing video (FFmpeg)...";

            const hlsUrl = xhr.responseText;

            setTimeout(() => {
                window.location.href = `/player?hls=${hlsUrl}`;
            }, 1500);
        };

        xhr.onerror = () => {
            status.innerText = "Upload failed";
        };

        xhr.send(formData);
    }

</script>

</body>
</html>
